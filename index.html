<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Arcade | Unblocked Games</title>
    <style>
        /* Hides scrollbars and creates a deep space background */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0b16;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Futuristic, glowing cosmic menu bar */
        .menu-bar {
            height: 60px;
            background: rgba(15, 15, 35, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding-left: 20px;
            border-bottom: 2px solid #8a2be2;
            box-shadow: 0px 0px 20px rgba(138, 43, 226, 0.4);
        }

        /* Glowing logo text */
        .site-title {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ffff;
        }

        /* Neon space arcade buttons */
        .game-btn {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid #8a2be2;
            padding: 10px 20px;
            margin-right: 12px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 5px rgba(138, 43, 226, 0.2);
        }

        /* Hover effect that glows cyan */
        .game-btn:hover {
            background-color: #00ffff;
            color: #0b0b16;
            border-color: #00ffff;
            box-shadow: 0 0 15px #00ffff;
            transform: translateY(-2px);
        }

        /* The container where the game loads */
        .game-container {
            width: 100%;
            height: calc(100% - 62px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Cosmic Menu Bar -->
    <div class="menu-bar">
        <div class="site-title">🚀 Orbit Arcade</div>
        <button class="game-btn" onclick="changeGame('https://veck.io')">Veck.io</button>
        <button class="game-btn" onclick="changeGame('https://googleusercontent.com')">Slope</button>
    </div>

    <!-- The Game Frame (Equipped with Automatic Mouse Lock) -->
    <div class="game-container">
        <iframe 
            id="gameFrame"
            src="https://veck.io" 
            allow="pointer-lock; fullscreen"
            sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms">
        </iframe>
    </div>

    <!-- Script to change games when a button is clicked -->
    <script>
        function changeGame(gameUrl) {
            document.getElementById('gameFrame').src = gameUrl;
        }
    </script>

</body>
</html>
